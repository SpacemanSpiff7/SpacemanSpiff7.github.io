<head>
  <meta charset="UTF-8">

  <title>Stone Fruit Variety Guide -- California Seasonal Produce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
:root {
  --bg-body: #F7F3ED;
  --bg-panel: #FFFDF8;
  --bg-panel-hover: #FAF6EF;
  --text-primary: #3A2E22;
  --text-secondary: #6B5B4D;
  --text-muted: #9A8A7A;
  --text-accent: #D4702C;
  --text-inverse: #FFFDF8;
  --ring-border: #E5DDD0;
  --shadow-panel: 0px 2px 4px rgba(0,0,0,0.08);
  --font-heading: 'Fraunces', 'Georgia', serif;
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 40px;
  --radius: 3px;
  --ease: cubic-bezier(0.25, 0.1, 0.25, 1);

  --color-cherry: #7A2332;
  --color-apricot: #C9943A;
  --color-yellow-peach: #D4885C;
  --color-white-peach: #C9A0A0;
  --color-donut-peach: #D4977A;
  --color-nectarine: #B05A3A;
  --color-plum: #5C2D5E;
  --color-pluot: #8A3A6A;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 15px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  color: var(--text-primary);
  background: var(--bg-body);
  line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3 { font-family: var(--font-heading); font-weight: 700; line-height: 1.15; }
a { color: var(--text-accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* --- Background Composition --- */
.bg-decor { position: fixed; pointer-events: none; z-index: -1; }
.bg-cream-tri {
  top: -10%; right: -5%; width: 50vw; height: 50vh;
  background: #D4702C; opacity: 0.04;
  clip-path: polygon(30% 0%, 100% 0%, 100% 100%);
}
.bg-rust-wedge {
  top: 5%; left: -8%; width: 45vw; height: 55vh;
  background: #CB5207; opacity: 0.03;
  clip-path: polygon(0% 20%, 80% 0%, 60% 100%, 0% 80%);
  filter: blur(40px);
}
.bg-deep-red-blob {
  bottom: -5%; left: -10%; width: 50vw; height: 45vh;
  background: #8D2A0D; opacity: 0.03;
  border-radius: 60% 40% 70% 30%; filter: blur(60px);
}
.bg-gold-stripe {
  top: 30%; right: 0; width: 8vw; height: 40vh;
  background: linear-gradient(180deg, #F29A0D 0%, #4A9068 100%);
  opacity: 0.04; filter: blur(30px);
}

body::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 9999; opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}

/* --- Nav Bar --- */
.site-nav {
  position: sticky;
  top: 0;
  z-index: 150;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-sm) var(--space-lg);
  background: var(--bg-body);
  border-bottom: 1px solid var(--ring-border);
}

.nav-brand {
  font-family: var(--font-heading);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-primary);
  text-decoration: none;
  letter-spacing: 0.01em;
}
.nav-brand span { color: var(--text-accent); }
.nav-brand:hover { text-decoration: none; }

.nav-hamburger {
  width: 36px; height: 36px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 5px;
  background: none;
  border: 1px solid var(--ring-border);
  border-radius: var(--radius);
  cursor: pointer; padding: 0;
  transition: border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.nav-hamburger:hover { border-color: var(--text-accent); }

.nav-hamburger span {
  display: block; width: 16px; height: 1.5px;
  background: var(--text-secondary); border-radius: 1px;
  transition: transform 0.25s var(--ease), opacity 0.2s;
}
.nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav-hamburger.open span:nth-child(2) { opacity: 0; }
.nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

.nav-menu {
  position: absolute;
  top: 100%; right: var(--space-lg);
  background: var(--bg-panel);
  border: 1px solid var(--ring-border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-panel);
  z-index: 160;
  min-width: 200px;
  display: none;
}
.nav-menu.open { display: block; }
.nav-menu-inner { padding: var(--space-md); }

.nav-menu-label {
  font-size: 0.6rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: var(--space-xs);
}
.nav-menu-link {
  display: block; font-size: 0.82rem;
  color: var(--text-primary); text-decoration: none;
  padding: var(--space-xs) 0;
  transition: color 0.15s;
}
.nav-menu-link:hover { color: var(--text-accent); text-decoration: none; }

/* --- Page Header --- */
.page-header {
  text-align: center;
  padding: 0 var(--space-lg) var(--space-lg);
  opacity: 0;
}
.page-title {
  font-size: clamp(1.4rem, 4vw, 2.2rem);
  color: var(--text-primary);
  margin-bottom: var(--space-xs);
}
.page-title span { color: var(--text-accent); }
.page-subtitle {
  font-size: 0.85rem;
  color: var(--text-secondary);
  max-width: 480px;
  margin: 0 auto;
}

/* --- Legend --- */
.legend {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: var(--space-sm) var(--space-md);
  padding: var(--space-sm) var(--space-lg) var(--space-lg);
  opacity: 0;
}
.legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 0.7rem; color: var(--text-secondary);
}
.legend-swatch {
  width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
}

/* --- Month Sections --- */
.months-container {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 var(--space-md);
}

.month-section {
  margin-bottom: var(--space-xl);
  opacity: 0;
}

.month-header {
  padding: var(--space-md) 0 var(--space-sm);
  border-bottom: 1px solid var(--ring-border);
  display: flex;
  align-items: baseline;
  gap: var(--space-sm);
}

.month-name {
  font-family: var(--font-heading);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.01em;
}

.month-count {
  font-size: 0.72rem;
  color: var(--text-muted);
}

.month-now-badge {
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-accent);
  background: rgba(212,112,44,0.1);
  padding: 2px 8px;
  border-radius: 2px;
  margin-left: auto;
}

.month-body {
  padding: var(--space-sm) 0;
}

.month-empty {
  padding: var(--space-xl) 0;
  text-align: center;
  font-size: 0.82rem;
  color: var(--text-muted);
  font-style: italic;
}

/* --- Golden Window Banner --- */
.golden-banner {
  max-width: 680px;
  margin: 0 auto var(--space-lg);
  padding: var(--space-md) var(--space-lg);
  background: rgba(212,112,44,0.06);
  border-left: 3px solid rgba(212,112,44,0.3);
  border-radius: var(--radius);
  font-size: 0.8rem;
  color: var(--text-secondary);
  opacity: 0;
}

.golden-banner strong {
  color: var(--text-accent);
  font-weight: 700;
}

/* --- Variety Cards (Accordion) --- */
.variety-card {
  border: 1px solid var(--ring-border);
  border-radius: var(--radius);
  margin-bottom: var(--space-sm);
  background: var(--bg-panel);
  overflow: hidden;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
}

.variety-card.revealed {
  opacity: 1;
  transform: translateY(0);
}

.variety-card.import-card {
  border-style: dashed;
}
.variety-card.import-card .card-head {
  opacity: 0.6;
}
.variety-card.import-card.revealed {
  opacity: 1;
}

.card-head {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: 10px var(--space-md);
  cursor: pointer;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.card-head:hover { background: var(--bg-panel-hover); }

.card-type-dot {
  width: 4px;
  align-self: stretch;
  border-radius: 2px;
  flex-shrink: 0;
}

.card-info { flex: 1; min-width: 0; }

.card-name {
  font-size: 0.85rem;
  font-weight: 600;
  line-height: 1.25;
}

.card-meta {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  margin-top: 1px;
}

.card-type-label {
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.card-timing {
  font-size: 0.65rem;
  color: var(--text-muted);
}

.card-badge {
  display: inline-block;
  font-size: 0.55rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 2px;
  flex-shrink: 0;
}
.badge-rare { background: rgba(196,122,108,0.2); color: #B05A3A; }
.badge-import { background: rgba(58,46,34,0.08); color: var(--text-muted); }

.card-chevron {
  width: 20px; height: 20px;
  flex-shrink: 0;
  color: var(--text-muted);
  transition: transform 0.25s var(--ease);
}

.variety-card.open .card-chevron {
  transform: rotate(180deg);
}

/* --- Accordion Body --- */
.card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s var(--ease);
}

.variety-card.open .card-body {
  max-height: 800px;
  transition: max-height 0.45s var(--ease);
}

.card-body-inner {
  padding: 0 var(--space-md) var(--space-md);
  border-top: 1px solid var(--ring-border);
}

.detail-section {
  padding-top: var(--space-md);
}

.detail-section-title {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: var(--space-xs);
}

.detail-text {
  font-size: 0.84rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

.detail-text em {
  color: var(--text-primary);
  font-style: italic;
}

/* Season minibar */
.detail-minibar-wrap {
  margin-top: var(--space-sm);
}
.detail-minibar-labels {
  display: flex; gap: 1px; margin-bottom: 2px;
}
.detail-minibar-labels span {
  flex: 1; text-align: center;
  font-size: 0.55rem; font-weight: 500;
  color: var(--text-muted); line-height: 1;
}
.detail-minibar {
  display: flex; gap: 1px; height: 8px;
  border-radius: 1px; overflow: hidden;
}
.minibar-cell {
  flex: 1; background: rgba(58,46,34,0.06); border-radius: 1px;
}
.minibar-cell.in-season { opacity: 0.45; }
.minibar-cell.peak { opacity: 1; }

.detail-note {
  margin-top: var(--space-md);
  font-size: 0.78rem;
  color: var(--text-secondary);
  padding: var(--space-sm) var(--space-md);
  background: rgba(58,46,34,0.04);
  border-radius: var(--radius);
  line-height: 1.55;
  font-style: italic;
}

/* --- Now Indicator --- */
.now-indicator {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 var(--space-md);
  position: relative;
}

.now-line {
  height: 2px;
  background: linear-gradient(90deg, var(--text-accent), transparent);
  opacity: 0.4;
  margin: var(--space-sm) 0;
}

.now-label {
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text-accent);
  letter-spacing: 0.03em;
}

/* --- Footer --- */
.site-footer {
  padding: var(--space-xl) var(--space-lg);
  text-align: center;
  font-size: 0.72rem;
  color: var(--text-muted);
  border-top: 1px solid var(--ring-border);
}
.site-footer a { color: var(--text-accent); }

/* --- Animations --- */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.anim-in { animation: fadeSlideIn 0.4s var(--ease) forwards; }
.anim-fade { animation: fadeIn 0.4s var(--ease) forwards; }

/* --- Responsive --- */
@media (max-width: 480px) {
  .page-header { padding: 0 var(--space-md) var(--space-md); }
  .legend { padding: var(--space-xs) var(--space-md) var(--space-md); gap: var(--space-xs) var(--space-sm); }
  .legend-item { font-size: 0.62rem; }
  .months-container { padding: 0 var(--space-sm); }
  .month-name { font-size: 1.1rem; }
  .card-name { font-size: 0.8rem; }
  .golden-banner { margin-left: var(--space-sm); margin-right: var(--space-sm); }
}

@media (min-width: 768px) {
  .months-container { padding: 0 var(--space-lg); }
  .month-name { font-size: 1.5rem; }

  /* Two-column card grid within each month */
  .month-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-sm);
  }
}

@media (prefers-reduced-motion: reduce) {
  .page-nav, .page-header, .legend, .month-section,
  .variety-card, .golden-banner { opacity: 1 !important; transform: none !important; }
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    transition-duration: 0.001ms !important;
  }
}
  </style>
</head>

  var MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
  var MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function getType(typeId) {
    for (var i = 0; i < FRUIT_TYPES.length; i++) {
      if (FRUIT_TYPES[i].id === typeId) return FRUIT_TYPES[i];
    }
    return { id: typeId, label: typeId, color: '#9A8A7A' };
  }

  function isInRange(month, start, end) {
    var sm = start[0], em = end[0];
    if (em >= sm) return month >= sm && month <= em;
    return month >= sm || month <= em;
  }

  function formatRange(start, end) {
    return MONTH_SHORT[start[0]-1] + ' ' + start[1] + ' -- ' + MONTH_SHORT[end[0]-1] + ' ' + end[1];
  }

  // Determine which months a variety appears in (by peak period)
  function peakMonths(v) {
    var months = [];
    var s = v.peakStart[0], e = v.peakEnd[0];
    if (e >= s) {
      for (var m = s; m <= e; m++) months.push(m);
    } else {
      for (var m = s; m <= 12; m++) months.push(m);
      for (var m = 1; m <= e; m++) months.push(m);
    }
    return months;
  }

  // --- Build Legend ---
  function buildLegend() {
    var el = document.getElementById('legend');
    FRUIT_TYPES.forEach(function(t) {
      var item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = '<div class="legend-swatch" style="background:' + t.color + '"></div>' + t.label;
      el.appendChild(item);
    });
  }

  // --- Build Month Sections ---
  function buildTimeline() {
    var container = document.getElementById('timeline-content');
    var now = new Date();
    var currentMonth = now.getMonth() + 1; // 1-indexed

    // Build a map: month -> varieties peaking that month
    // Sort within each month by type order, then by peak start day
    var monthMap = {};
    for (var m = 1; m <= 12; m++) monthMap[m] = [];

    VARIETIES.forEach(function(v) {
      var months = peakMonths(v);
      months.forEach(function(m) {
        monthMap[m].push(v);
      });
    });

    // Sort each month's varieties by fruit type order, then peak start day
    var typeOrder = {};
    FRUIT_TYPES.forEach(function(t, i) { typeOrder[t.id] = i; });

    for (var m = 1; m <= 12; m++) {
      monthMap[m].sort(function(a, b) {
        var ta = typeOrder[a.type] || 0, tb = typeOrder[b.type] || 0;
        if (ta !== tb) return ta - tb;
        return a.peakStart[1] - b.peakStart[1];
      });
    }

    // Render months
    for (var m = 1; m <= 12; m++) {
      var items = monthMap[m];
      var isNow = (m === currentMonth);

      // Golden window banner before July
      if (m === 7) {
        var banner = document.createElement('div');
        banner.className = 'golden-banner';
        banner.id = 'golden-banner';
        banner.innerHTML = '<strong>Peak Season</strong> -- Late July through mid-August is the golden window for California stone fruit. The widest selection and best quality of the year.';
        container.appendChild(banner);
      }

      var section = document.createElement('section');
      section.className = 'month-section';
      section.id = 'month-' + m;

      // Header
      var header = document.createElement('div');
      header.className = 'month-header';
      header.innerHTML = '<span class="month-name">' + MONTH_NAMES[m-1] + '</span>' +
        (items.length > 0 ? '<span class="month-count">' + items.length + ' variet' + (items.length === 1 ? 'y' : 'ies') + '</span>' : '') +
        (isNow ? '<span class="month-now-badge">Now</span>' : '');
      section.appendChild(header);

      var body = document.createElement('div');
      body.className = 'month-body';

      if (items.length === 0) {
        body.innerHTML = '<div class="month-empty">No stone fruit in peak season</div>';
      } else {
        items.forEach(function(v) {
          body.appendChild(buildCard(v));
        });
      }

      section.appendChild(body);
      container.appendChild(section);
    }
  }

  // --- Build Variety Card ---
  function buildCard(v) {
    var t = getType(v.type);
    var card = document.createElement('div');
    card.className = 'variety-card';
    if (v.isImport) card.classList.add('import-card');
    card.dataset.id = v.id;

    // Badges
    var badges = '';
    if (v.rarity) badges += '<span class="card-badge badge-rare">Rare</span>';
    if (v.isImport) badges += '<span class="card-badge badge-import">Import</span>';

    // Head
    var head = document.createElement('div');
    head.className = 'card-head';
    head.innerHTML =
      '<div class="card-type-dot" style="background:' + t.color + '"></div>' +
      '<div class="card-info">' +
        '<div class="card-name" style="color:' + t.color + '">' + v.name + ' ' + badges + '</div>' +
        '<div class="card-meta">' +
          '<span class="card-type-label" style="color:' + t.color + '">' + t.label + '</span>' +
          '<span class="card-timing">Peak ' + formatRange(v.peakStart, v.peakEnd) + '</span>' +
        '</div>' +
      '</div>' +
      '<svg class="card-chevron" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 8 10 12 14 8"/></svg>';

    // Body (accordion content)
    var body = document.createElement('div');
    body.className = 'card-body';

    // Minibar
    var monthLabels = MONTH_SHORT.map(function(n) { return '<span>' + n.charAt(0) + '</span>'; }).join('');
    var cells = '';
    for (var m = 1; m <= 12; m++) {
      var cls = 'minibar-cell';
      if (isInRange(m, v.seasonStart, v.seasonEnd)) cls += ' in-season';
      if (isInRange(m, v.peakStart, v.peakEnd)) cls += ' peak';
      var hasFill = cls.indexOf('in-season') >= 0 || cls.indexOf('peak') >= 0;
      cells += '<div class="' + cls + '"' + (hasFill ? ' style="background:' + t.color + '"' : '') + '></div>';
    }

    var inner = '<div class="card-body-inner">' +
      '<div class="detail-section">' +
        '<div class="detail-section-title">Season</div>' +
        '<div class="detail-text">Peak: <em>' + formatRange(v.peakStart, v.peakEnd) + '</em><br>' +
          'Available: ' + formatRange(v.seasonStart, v.seasonEnd) + '</div>' +
        '<div class="detail-minibar-wrap">' +
          '<div class="detail-minibar-labels">' + monthLabels + '</div>' +
          '<div class="detail-minibar">' + cells + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="detail-section">' +
        '<div class="detail-section-title">Flavor</div>' +
        '<div class="detail-text">' + v.flavor + '</div>' +
      '</div>' +
      '<div class="detail-section">' +
        '<div class="detail-section-title">Buying Tips</div>' +
        '<div class="detail-text">' + v.buyingTip + '</div>' +
      '</div>' +
      '<div class="detail-section">' +
        '<div class="detail-section-title">Where to Find</div>' +
        '<div class="detail-text">' + v.where + '</div>' +
      '</div>';

    if (v.notes) {
      inner += '<div class="detail-note">' + v.notes + '</div>';
    }

    inner += '</div>';
    body.innerHTML = inner;

    card.appendChild(head);
    card.appendChild(body);

    // Click handler
    head.addEventListener('click', function() {
      var wasOpen = card.classList.contains('open');
      card.classList.toggle('open');

      // Scroll into view if opening and card is near viewport top
      if (!wasOpen) {
        setTimeout(function() {
          var rect = card.getBoundingClientRect();
          if (rect.top < 60) {
            card.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        }, 100);
      }
    });

    return card;
  }

  // --- IntersectionObserver for reveals ---
  function setupObserver() {
    var targets = document.querySelectorAll('.month-section, .variety-card, .golden-banner');
    if (!('IntersectionObserver' in window)) {
      targets.forEach(function(el) {
        el.style.opacity = '1';
        el.style.transform = 'none';
        if (el.classList.contains('variety-card')) el.classList.add('revealed');
      });
      return;
    }

    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (!entry.isIntersecting) return;
        var el = entry.target;
        if (el.classList.contains('variety-card')) {
          el.classList.add('revealed');
        } else {
          el.classList.add('anim-in');
        }
        observer.unobserve(el);
      });
    }, { rootMargin: '0px 0px -30px 0px', threshold: 0.05 });

    targets.forEach(function(el) { observer.observe(el); });
  }

  // --- Nav Menu ---
  function bindNavMenu() {
    var hamburger = document.getElementById('nav-hamburger');
    var menu = document.getElementById('nav-menu');
    if (!hamburger || !menu) return;

    hamburger.addEventListener('click', function(e) {
      e.stopPropagation();
      hamburger.classList.toggle('open');
      menu.classList.toggle('open');
    });

    document.addEventListener('click', function(e) {
      if (menu.classList.contains('open') && !menu.contains(e.target)) {
        hamburger.classList.remove('open');
        menu.classList.remove('open');
      }
    });

    var brand = document.getElementById('nav-brand');
    if (brand) {
      brand.addEventListener('click', function(e) {
        e.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }
  }

  // --- Load Animation ---
  function runLoadAnimation() {
    setTimeout(function() { document.getElementById('page-header').classList.add('anim-in'); }, 100);
    setTimeout(function() { document.getElementById('legend').classList.add('anim-fade'); }, 250);
    setTimeout(setupObserver, 350);
  }

  // --- Scroll to current season ---
  function scrollToNow() {
    var now = new Date();
    var month = now.getMonth() + 1;
    // If outside stone fruit season (Apr-Sep), go to April
    var target = (month >= 4 && month <= 9) ? month : 4;
    var el = document.getElementById('month-' + target);
    if (!el) return;

    setTimeout(function() {
      var y = el.offsetTop - 20;
      window.scrollTo({ top: Math.max(0, y), behavior: 'smooth' });
    }, 600);
  }



  // --- Init ---
  function init() {
    buildLegend();
    buildTimeline();
    bindNavMenu();
    runLoadAnimation();
    scrollToNow();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
