<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seasonal Produce California</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <h1 class="site-title">Seasonal Produce <span>California</span></h1>
  </header>

  <section class="ring-section">
    <div class="ring-nav-row">
      <button class="ring-arrow" id="ring-prev" aria-label="Previous month">&#8249;</button>
      <div class="ring-container" id="ring-container">
        <div class="ring-tick"></div>
        <svg class="ring-svg" viewBox="0 0 300 300" id="ring-svg">
          <g class="ring-segments-group" id="ring-group"></g>
        </svg>
        <div class="ring-center" id="ring-center">
          <span class="ring-month" id="ring-month"></span>
          <span class="ring-count" id="ring-count">--</span>
          <span class="ring-label" id="ring-label">in season</span>
          <span class="ring-peak-label" id="ring-peak-label"></span>
        </div>
      </div>
      <button class="ring-arrow" id="ring-next" aria-label="Next month">&#8250;</button>
    </div>
  </section>

  <div class="quick-actions" id="quick-actions">
    <button class="quick-btn active" data-action="all">All</button>
    <button class="quick-btn" data-action="peak">At Peak</button>
    <button class="quick-btn" data-action="coming">Coming Soon</button>
    <button class="quick-btn" data-action="leaving">Leaving Peak</button>
  </div>

  <section class="controls">
    <div class="controls-inner">
      <div class="search-row">
        <input type="text" id="search" class="search-input" placeholder="Search produce..." autocomplete="off" spellcheck="false">
      </div>

      <div class="filter-row">
        <div class="filter-group category-filters" id="category-filters"></div>
        <div class="filter-group source-filters" id="source-filters">
          <button class="chip" data-source="local">Local</button>
          <button class="chip" data-source="import">Import</button>
        </div>
        <div class="view-toggle">
          <button class="view-btn active" data-view="timeline" id="view-timeline">Timeline</button>
          <button class="view-btn" data-view="grid" id="view-grid">Grid</button>
        </div>
      </div>
    </div>
  </section>

  <main id="main-content">
    <div class="timeline-container" id="timeline-container">
      <div class="timeline-header" id="timeline-header"></div>
      <div class="timeline-body" id="timeline-body"></div>
    </div>

    <div class="grid-container hidden" id="grid-container"></div>
  </main>

  <div class="detail-panel hidden" id="detail-panel">
    <button class="detail-close" id="detail-close" aria-label="Close detail">&times;</button>
    <div class="detail-content" id="detail-content"></div>
  </div>

  <footer class="site-footer">
    <p>Data covers 97 of 332 produce items. <a href="compact.html">Compact view</a></p>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
