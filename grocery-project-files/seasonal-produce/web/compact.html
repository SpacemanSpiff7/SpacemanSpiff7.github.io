<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seasonal Produce California — Compact View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="compact-style.css">
</head>
<body>
  <div class="paper-grain"></div>

  <nav class="compact-nav">
    <a href="index.html" class="compact-nav-link">Ring view</a>
  </nav>

  <header class="site-header">
    <div class="header-content">
      <div class="header-title">
        <span class="header-leaf">seasonal</span>
        <h1>Produce<br><span class="header-accent">California</span></h1>
      </div>
      <p class="header-tagline">What's growing, where it's from, when it peaks</p>
    </div>
  </header>

  <section class="controls">
    <div class="controls-inner">
      <div class="search-row">
        <input type="text" id="search" class="search-input" placeholder="Search produce..." autocomplete="off" spellcheck="false">
      </div>

      <div class="filter-row">
        <div class="filter-group category-filters" id="category-filters"></div>
        <div class="filter-group source-filters" id="source-filters">
          <button class="chip" data-source="local">Local</button>
          <button class="chip" data-source="import">Import</button>
        </div>
      </div>

      <div class="scrubber-row">
        <div class="month-scrubber" id="month-scrubber"></div>
        <button class="today-btn" id="today-btn">Today</button>
      </div>

      <div class="stats-row">
        <span class="stat" id="stats-line"></span>
        <div class="view-toggle">
          <button class="view-btn active" data-view="timeline" id="view-timeline">Timeline</button>
          <button class="view-btn" data-view="grid" id="view-grid">Grid</button>
        </div>
      </div>
    </div>
  </section>

  <main id="main-content">
    <div class="timeline-container" id="timeline-container">
      <div class="timeline-header" id="timeline-header"></div>
      <div class="timeline-body" id="timeline-body"></div>
    </div>

    <div class="grid-container hidden" id="grid-container"></div>
  </main>

  <div class="detail-panel hidden" id="detail-panel">
    <button class="detail-close" id="detail-close" aria-label="Close detail">&times;</button>
    <div class="detail-content" id="detail-content"></div>
  </div>

  <footer class="site-footer">
    <p>Data covers 97 of 332 produce items commonly found in California grocery stores and farmers markets.</p>
  </footer>

  <script src="compact-app.js" defer></script>
</body>
</html>
